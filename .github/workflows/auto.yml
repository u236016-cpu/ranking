name: Auto Ranking Update & Weekly Content

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1' # 毎週月曜 12:00 UTC

jobs:
  update_ranking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests beautifulsoup4 dataframe-image matplotlib pillow

      - name: Run main.py
        run: python main.py

      - name: Update README
        run: python update_readme.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_tables/*.png score.gif score_history.csv README.md
          git commit -m "Weekly ranking update" || echo "No changes to commit"
          git push
