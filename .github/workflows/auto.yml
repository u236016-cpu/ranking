name: auto-update

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜0時 UTC
  workflow_dispatch:

permissions:
  contents: write   # git push 用

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 日本語フォントインストール
      - run: sudo apt-get update && sudo apt-get install -y fonts-ipafont-gothic

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pandas requests beautifulsoup4 matplotlib pillow

      - run: python main.py

      - name: Commit & Push
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "update" || echo "no change"
          git push
