name: Update Weekly Ranking

on:
  schedule:
    - cron: '0 3 * * 2'  # JST 火曜 12:00 = UTC 3:00
  workflow_dispatch:

jobs:
  update_ranking:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-ipafont
        python -m pip install --upgrade pip
        pip install pandas matplotlib beautifulsoup4 dataframe-image requests

    - name: Run ranking update
      run: |
        python main.py

    - name: Update README with latest images
      run: |
        cp README.md README.md.bak
        grep -v '!\[最新順位表\]' README.md.bak | grep -v '!\[正解数推移\]' > README.md
        echo "![最新順位表](weekly_tables/ranking_table_$(date +'%Y-%m-%d').jpeg)" >> README.md
        echo "![正解数推移](score_history_plot.jpeg)" >> README.md

    - name: Commit and push updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add weekly_tables/*.jpeg score_history.csv score_history_plot.jpeg README.md
        git commit -m "Weekly ranking update" || echo "No changes to commit"
        git push
