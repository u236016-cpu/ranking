name: Update Weekly Ranking

on:
  schedule:
    - cron: '0 3 * * 1'  # 毎週月曜 03:00 UTC (日本時間 12:00 JST)
  workflow_dispatch:

jobs:
  update_ranking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib requests beautifulsoup4 dataframe-image

      - name: Run ranking script
        run: |
          python main.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_tables/ score_history.csv score_history_plot.png
          git commit -m "Weekly ranking update" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
