name: Update Daily Ranking

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  update_ranking:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk
        fc-cache -fv

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib beautifulsoup4 dataframe-image requests

    - name: Run script
      run: python main.py

    - name: Update README
      run: |
        cp README.md README.md.bak
        grep -v '!\[最新順位表\]' README.md.bak | grep -v '!\[正解数推移\]' > README.md
        echo "![最新順位表](weekly_tables/ranking_table_$(date +'%Y-%m-%d').jpeg)" >> README.md
        echo "![正解数推移](score_history_plot.jpeg)" >> README.md

    - name: Commit & Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Daily ranking update" || echo "No changes"
        git push
