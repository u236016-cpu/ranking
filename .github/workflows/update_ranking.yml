name: Update Daily Ranking

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  update_ranking:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies (fonts)
      run: |
        sudo apt-get update
        sudo apt-get install -y fonts-noto-cjk
        fc-cache -fv

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib beautifulsoup4 dataframe-image requests

    - name: Run script
      run: python main.py

    - name: Update README (overwrite)
      run: |
        TODAY=$(date +'%Y-%m-%d')

        cat << EOF > README.md
# 📊 プロ野球順位予想

最終更新日: ${TODAY}

## 最新順位表
![最新順位表](ranking_table.jpeg)

## 正解数推移
![正解数推移](score_history_plot.jpeg)

EOF

    - name: Commit & Push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Daily ranking update" || echo "No changes"
        git push
