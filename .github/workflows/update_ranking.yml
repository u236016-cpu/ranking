name: Update Weekly Ranking

on:
  schedule:
    - cron: '0 3 * * 2'  # UTC 3:00 = JST 火曜 12:00
  workflow_dispatch:

jobs:
  update_ranking:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas matplotlib beautifulsoup4 dataframe-image requests ipaxegothic

    - name: Run ranking update
      run: |
        python main.py

    - name: Update README with latest images
      run: |
        DATE=$(date '+%Y-%m-%d')
        # 古い順位表・正解数推移画像を削除
        sed -i '/!\[最新順位表\]/d' README.md
        sed -i '/!\[正解数推移\]/d' README.md

        # 最新画像を README に追記
        echo "" >> README.md
        echo "![最新順位表](weekly_tables/ranking_table_${DATE}.png)" >> README.md
        echo "![正解数推移](score_history_plot.png)" >> README.md

    - name: Commit and push updates
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add weekly_tables/*.png score_history.csv README.md
        git commit -m "Weekly ranking update" || echo "No changes to commit"
        git push
